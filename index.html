<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-vvz.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website van VVZ'49</title>
    <script>
      // GitHub Pages SPA: recover path from 404-redirect query string
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          });
          window.history.replaceState(
            null, null,
            l.pathname.slice(0, -1) +
            (decoded[0] ? decoded[0] : '/') +
            (decoded[1] ? '?' + decoded[1] : '') +
            l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
