    <meta charset="UTF-8" />

    <meta property="og:site_name" content="VVZ'49" />

    <meta name="twitter:image" content="https://thewally.github.io/vvz-toolbox/og-image.png" />
    <script>
      // GitHub Pages SPA: recover path from 404-redirect query string (?p=/path&q=query)
      (function(l) {
        var params = new URLSearchParams(l.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          window.history.replaceState(
            null, null,
            '/vvz-toolbox' + p.replace(/~and~/g, '&') +
            (q ? '?' + q.replace(/~and~/g, '&') : '') +
            l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
