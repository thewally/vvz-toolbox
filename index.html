<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo-vvz.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <title>Website van VVZ'49</title>
    <script>
      // GitHub Pages SPA: recover path from 404-redirect query string (?p=/path&q=query)
      (function(l) {
        var params = new URLSearchParams(l.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q');
          window.history.replaceState(
            null, null,
            '/vvz-toolbox' + p.replace(/~and~/g, '&') +
            (q ? '?' + q.replace(/~and~/g, '&') : '') +
            l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
