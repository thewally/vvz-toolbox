name: Sportlink Data Cache
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Sportlink data
        run: node scripts/sportlink-cache.js
        env:
          SPORTLINK_CLIENT_ID: ${{ secrets.VITE_SPORTLINK_CLIENT_ID }}
          SPORTLINK_CLUB_RELATIECODE: ${{ secrets.VITE_SPORTLINK_CLUB_RELATIECODE }}

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update Sportlink cache"
          file_pattern: "public/data/**"
